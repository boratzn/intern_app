name: intern_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.1+5

environment:
  sdk: ^3.10.4

dependencies:
  appflowy_board: ^0.1.2
  cached_network_image: ^3.3.1
  connectivity_plus: ^7.1.1
  dio: ^5.4.0
  file_picker: ^11.0.2
  firebase_core: ^4.7.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.1
  flutter_svg: ^2.0.9
  fluttertoast: ^9.0.0
  google_fonts: ^8.0.2
  http: ^1.2.0
  image_picker: ^1.0.4
  intl: ^0.20.2
  lottie: ^3.3.2
  onesignal_flutter: ^5.1.8
  percent_indicator: ^4.2.5
  share_plus: ^12.0.1
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  sizer: ^3.1.3
  stacked: ^3.4.0
  stacked_services: ^1.1.1
  supabase_flutter: ^2.9.1
  syncfusion_flutter_charts: ^33.2.3
  syncfusion_flutter_pdfviewer: ^33.2.3
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.7.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  stacked_generator: ^2.0.0


flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true # CRITICAL: Required for Material icon font - DO NOT REMOVE
  assets:
    - assets/
    - assets/images/
    - .env
  # CRITICAL ASSET MANAGEMENT RULES:
  # - DO NOT ADD NEW ASSET DIRECTORIES (assets/svg/, assets/icons/, etc.)
  # - ONLY USE EXISTING AND ITEMS AVAILABLE IN THE DIRECTORIES LISTED ABOVE (assets/, assets/images/)
  # CRITICAL FONTS RULE:
  # - THIS PROJECT USES GOOGLE FONTS INSTEAD OF LOCAL FONTS
  # - DO NOT ADD ANY LOCAL FONTS SECTION OR FONT FILES
